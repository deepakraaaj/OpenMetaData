version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: om-postgres
    environment:
      POSTGRES_USER: openmetadata
      POSTGRES_PASSWORD: openmetadata
      POSTGRES_DB: openmetadata
    ports:
      - "5434:5432"
    volumes:
      - om_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    container_name: om-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - om_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20

  openmetadata:
    image: openmetadata/server:1.12.0
    container_name: openmetadata-server
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      OM_DATABASE: openmetadata
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      SEARCH_TYPE: elasticsearch
      SERVER_HOST_API_URL: http://openmetadata:8585/api
      AIRFLOW_HOST: http://ingestion:8080
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://ingestion:8080
      AUTHORIZER_CLASS_NAME: org.openmetadata.service.security.DefaultAuthorizer
    ports:
      - "8585:8585"
    volumes:
      - ../output/openmetadata:/opt/openmetadata/output

  ingestion:
    image: openmetadata/ingestion:1.12.0
    container_name: openmetadata-ingestion
    depends_on:
      - openmetadata
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: openmetadata
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://openmetadata:openmetadata@postgres:5432/openmetadata
      OPENMETADATA_SERVER: http://openmetadata:8585/api
    ports:
      - "8081:8080"
    volumes:
      - ../output/openmetadata:/opt/airflow/ingestion

volumes:
  om_postgres_data:
  om_es_data:

